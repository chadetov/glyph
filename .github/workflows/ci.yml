name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  versions:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Publish discipline: the workspace Cargo version, the six npm
      # package.json versions, and the launcher's optionalDependencies pins must
      # all agree, or a release ships half-bumped. Also flags (non-fatally) when
      # the published npm `latest` has fallen behind the repo.
      - name: Check version consistency
        run: python3 scripts/check_versions.py

  test:
    name: Test + type-check examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The Rust toolchain is pinned by rust-toolchain.toml; rustup installs it
      # on the first cargo invocation. Cache the registry + build dir to keep CI
      # fast.
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glyph-compiler/target
          key: cargo-${{ runner.os }}-${{ hashFiles('glyph-compiler/Cargo.lock') }}

      # node + tsx + tsc let the toolchain-dependent tests (glyph run, @example /
      # @doc @run execution) and the `--check` step actually run rather than skip.
      # typescript is pinned to 6.x to keep `tsc --strict` on the classic checker
      # for the examples type-check. `glyph gen dts` supports both the classic
      # (5/6) and 7.x native compilers, so its test exercises the classic path
      # here; the native path is covered separately.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install -g tsx typescript@6

      - name: Workspace tests
        working-directory: glyph-compiler
        run: cargo test --workspace --locked

      - name: Type-check the examples with tsc --strict
        working-directory: glyph-compiler
        # `glyph build` type-checks with tsc by default; --no-check would skip it.
        run: cargo run -q -- build ../examples --out "$RUNNER_TEMP/dist"
