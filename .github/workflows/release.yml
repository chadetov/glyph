name: Release

# Build the glyph binary for every supported platform, stage each into its
# `@glyph/<platform>` package, and publish the platform packages plus the
# `glyph` launcher to npm. Triggered by pushing a `v*` tag (e.g. `v0.1.0`) or
# manually. Publishing requires the `NPM_TOKEN` secret; without it the build
# matrix still runs and uploads artifacts, but the publish job is skipped.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.key }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin-x64 cross-compiles on Apple Silicon: GitHub's Intel macOS
          # runner (macos-13) is scarce and queues indefinitely, while macos-14
          # builds both Apple targets from one image.
          - key: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - key: darwin-x64
            os: macos-14
            target: x86_64-apple-darwin
          - key: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - key: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - key: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Add the target toolchain
        run: rustup target add ${{ matrix.target }}
        working-directory: glyph-compiler

      - name: Build release binary
        working-directory: glyph-compiler
        run: cargo build --release --locked -p glyph-cli --target ${{ matrix.target }}

      - name: Stage binary into its platform package (unix)
        if: matrix.key != 'win32-x64'
        run: node npm/scripts/stage.mjs ${{ matrix.key }} glyph-compiler/target/${{ matrix.target }}/release/glyph

      - name: Stage binary into its platform package (windows)
        if: matrix.key == 'win32-x64'
        run: node npm/scripts/stage.mjs ${{ matrix.key }} glyph-compiler/target/${{ matrix.target }}/release/glyph.exe

      - name: Upload staged platform package
        uses: actions/upload-artifact@v7
        with:
          name: platform-${{ matrix.key }}
          path: npm/platform/${{ matrix.key }}

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # OIDC token for npm build provenance (`npm publish --provenance`), which
      # links each published tarball to this workflow run + commit. Verifiable
      # with `npm audit signatures`.
      id-token: write
      contents: read
    # `secrets` is not available in `if` expressions, so map the token to `env`
    # at the job level and gate the publish steps on `env.NPM_TOKEN`.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Restore each platform package's staged binary over the (binary-less)
      # checked-in package directories.
      - name: Download staged platform packages
        uses: actions/download-artifact@v8
        with:
          path: staged

      - name: Place staged binaries
        run: |
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            cp -R "staged/platform-$key/." "npm/platform/$key/"
          done
          # Artifact upload/download does not preserve the Unix execute bit, so
          # restore it on the non-Windows binaries before packing/publishing.
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            chmod +x "npm/platform/$key/bin/glyph"
          done

      - name: Verify the launcher resolves
        run: node --test npm/scripts/resolve.test.mjs

      # Publish the platform packages first so the launcher's optional
      # dependencies exist when it is published.
      - name: Publish platform packages
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            npm publish "./npm/platform/$key" --access public --provenance
          done

      - name: Publish the glyph launcher
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./npm/glyph --access public --provenance

  release:
    name: Create GitHub Release
    needs: build
    # Only when a version tag is pushed; a manual run on a branch has no tag to
    # release against.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # OIDC + attestation write for SLSA build provenance over the archives,
      # verifiable with `gh attestation verify`.
      id-token: write
      attestations: write
    steps:
      - name: Download the staged platform binaries
        uses: actions/download-artifact@v8
        with:
          path: staged

      # Package each platform's binary into a downloadable archive: tarballs for
      # the unix targets, a zip for Windows.
      - name: Package per-platform archives
        run: |
          tag="${{ github.ref_name }}"
          mkdir -p dist
          for key in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            tar -czf "dist/glyph-${tag}-${key}.tar.gz" -C "staged/platform-${key}/bin" glyph
          done
          ( cd "staged/platform-win32-x64/bin" && zip -q "$GITHUB_WORKSPACE/dist/glyph-${tag}-win32-x64.zip" glyph.exe )
          ls -la dist

      # Published SHA-256 checksums for every archive, verifiable with
      # `sha256sum -c SHA256SUMS`.
      - name: Generate checksums
        run: ( cd dist && sha256sum glyph-* > SHA256SUMS && cat SHA256SUMS )

      # SLSA build provenance attestation over the archives (not the checksum
      # file). Links each archive to this workflow run + commit.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/glyph-*"

      - name: Create the release with the binaries attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          gh release create "$tag" dist/* \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes "Prebuilt \`glyph\` binaries for macOS, Linux, and Windows. Download the archive for your platform, extract it, and put \`glyph\` on your PATH. Each archive carries a SLSA build-provenance attestation (verify with \`gh attestation verify <archive> --repo ${{ github.repository }}\`) and a SHA-256 in \`SHA256SUMS\` (\`sha256sum -c SHA256SUMS\`); the npm packages are published with provenance (\`npm audit signatures\`)."
